[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",                   # verbose - show each test name
    "--strict-markers",     # unknown pytest.mark.xxx raises error
    "--tb=short",           # shorter tracebacks
]
markers = [
    "integration: tests requiring Docker (slower - starts a PostgreSQL container)",
]

[tool.coverage.run]
source = ["etl"]
omit = ["*/tests/*", "*/venv/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# E/W - pycodestyle, F - pyflakes, I - isort, UP - pyupgrade, B - bugbear
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line too long - handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # allow `assert False` in tests
